# CI/CD pipeline for the flightlog project.
# Runs on a self-hosted GitLab CE instance with a Docker-executor runner.
# Each stage runs in a fresh python:3.12-slim container.
#
#   lint -> validate -> test -> process -> render
#
# Only the render stage installs matplotlib (the [viz] extra), so the earlier
# stages stay fast.

stages:
  - lint
  - validate
  - test
  - process
  - render

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

default:
  image: python:3.12-slim
  cache:
    key:
      files:
        - pyproject.toml
    paths:
      - .cache/pip

lint:
  stage: lint
  before_script:
    - pip install --upgrade pip && pip install -e ".[dev]"
  script:
    - ruff check .

validate:
  stage: validate
  before_script:
    - pip install --upgrade pip && pip install -e .
  script:
    - flightlog validate data/sample_flight.csv

test:
  stage: test
  before_script:
    - pip install --upgrade pip && pip install -e ".[dev]"
  script:
    - pytest --cov=flightlog --cov-report=term --junitxml=report.xml
  coverage: '/(?i)total.*? (100(?:\.0+)?%|[1-9]?\d(?:\.\d+)?%)$/'
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      junit: report.xml

process:
  stage: process
  before_script:
    - pip install --upgrade pip && pip install -e .
  script:
    - flightlog process data/sample_flight.csv --out metrics.json
  artifacts:
    paths:
      - metrics.json
    expire_in: 1 week

render:
  stage: render
  before_script:
    - pip install --upgrade pip && pip install -e ".[viz]"
  script:
    - flightlog render data/sample_flight.csv --out flight-report.png
  artifacts:
    paths:
      - flight-report.png
    expire_in: 1 month
